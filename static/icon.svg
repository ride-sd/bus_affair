  <circle cx="156" cy="392" r="48" fill="#0F172A"/>
  <circle cx="156" cy="392" r="26" fill="#334155"/>
  <circle cx="156" cy="392" r="10" fill="#94A3B8"/>

  <circle cx="356" cy="392" r="48" fill="#0F172A"/>
  <circle cx="356" cy="392" r="26" fill="#334155"/>
  <circle cx="356" cy="392" r="10" fill="#94A3B8"/>

  <!-- Headlight -->
  <rect x="408" y="292" width="28" height="16" rx="6" fill="#FEF08A"/>
